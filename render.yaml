services:
  - type: web
    name: tipcalc
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./out
    headers:
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /chunks/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /icon.svg
        name: Cache-Control
        value: public, max-age=86400
      - path: /og-image.png
        name: Cache-Control
        value: public, max-age=86400
