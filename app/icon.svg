<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Teal rounded square (the icon shape; SVG canvas itself is transparent) -->
  <rect width="32" height="32" rx="7" fill="#0f766e"/>

  <!-- Large dollar sign, left-of-center -->
  <text
    x="14"
    y="24"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="22"
    font-weight="800"
    fill="white"
    text-anchor="middle"
  >$</text>

  <!-- Small % badge, upper right -->
  <text
    x="25"
    y="13"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="11"
    font-weight="700"
    fill="white"
    text-anchor="middle"
  >%</text>
</svg>
